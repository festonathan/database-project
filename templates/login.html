<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container d-flex align-items-center justify-content-center min-vh-100">
    <div class="card shadow-lg" style="max-width: 420px; width: 100%;">
        <div class="card-body p-5">
            <h1 class="text-center mb-4">Course Registration</h1>

            {% if msg %}
                <div class="alert alert-danger alert-dismissible fade show" role="alert">
                    {{ msg }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endif %}

            <form action="/login" method="POST">
                <div class="mb-3">
                    <label class="form-label">Username (ID)</label>
                    <input type="text" class="form-control form-control-lg" name="username"
                           placeholder="Enter your ID" required autofocus>
                </div>

                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control form-control-lg" name="password"
                           placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn btn-dark btn-lg w-100 mb-3">Sign In</button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
